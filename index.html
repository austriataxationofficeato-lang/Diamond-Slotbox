<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Diamond Slotbox 🎰</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Top Bar -->
        <div class="topbar">
            <div class="srow">
                <div class="chip">💎 DIAMOND</div>
                <div class="chip">🎰 SLOTS</div>
                <div class="chip">💰 WIN</div>
            </div>
            <div class="tbtns">
                <button class="ibtn">⚙️</button>
                <button class="ibtn">🔊</button>
                <div class="pav">👤</div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="mcontent">
            <!-- Tap Zone -->
            <div class="tapzone" id="tapZone">
                <div class="taphint">TAP TO SPIN</div>
            </div>

            <!-- Side Tags -->
            <div class="sidetags">
                <div class="stag">JACKPOT</div>
                <div class="stag">FREE SPINS</div>
                <div class="stag">VIP</div>
            </div>

            <!-- Flying Particles Container -->
            <div class="particles-container" id="particlesContainer"></div>

            <!-- Ad Placeholder -->
            <div class="adfloat" id="adFloat">📢</div>
        </div>

        <!-- Trophy Section -->
        <div class="trophy-section" id="trophySection">
            <div class="trophy">
                <div class="trophy-icon">🏆</div>
                <div class="djtxt">BIG WIN!</div>
                <div class="djsub">+5000 Credits</div>
            </div>
        </div>

        <!-- Jackpot Overlay -->
        <div class="jkovl" id="jkovl">
            <div class="jkbig">🎉 JACKPOT! 🎉</div>
            <div class="confetti" id="confetti"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
