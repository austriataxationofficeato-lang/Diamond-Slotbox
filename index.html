<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diamond Slotbox 🎰</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>💎 Diamond Slotbox 💎</h1>
            <p class="subtitle">Spin to Win!</p>
        </header>

        <div class="game-area">
            <div class="slot-machine">
                <div class="reels">
                    <div class="reel" id="reel1">💎</div>
                    <div class="reel" id="reel2">💎</div>
                    <div class="reel" id="reel3">💎</div>
                </div>
                <div class="payline"></div>
            </div>

            <div class="controls">
                <button id="spinBtn" class="spin-btn">🎰 SPIN</button>
                <div class="credits">
                    <span>Credits: <span id="credits">1000</span></span>
                </div>
                <div class="bet">
                    <span>Bet: <span id="bet">10</span></span>
                </div>
            </div>
        </div>

        <div class="invite-section">
            <h2>👥 Invite Friends</h2>
            <p>Share your link and compete with friends!</p>
            <button id="inviteBtn" class="invite-btn">🔗 Invite Friends</button>
        </div>

        <div class="win-section">
            <h2>🎉 Win Section</h2>
            <div id="winMessage" class="win-message hidden">
                <p id="winText">Congratulations!</p>
            </div>
        </div>

        <footer>
            <p>Made with 💎 and 🎰 | <a href="https://github.com/austriataxationofficeato-lang/Diamond-Slotbox" target="_blank">GitHub</a></p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
